ai_usage_summary: |
  Used Claude for architecture design, debugging, and code generation across
  the full pipeline (honeypot detection, fit scoring, availability scoring,
  ranking logic, and the Streamlit sandbox). All design decisions, dataset
  interpretation, and final logic were reviewed and directed by me. No
  candidate data was sent to any external LLM API during ranking — the
  ranking step itself is fully local and uses no network calls.

methodology_summary: |
  Three-layer ranking system. Layer 1 detects honeypot/impossible profiles
  (e.g. expert-level skills with zero usage duration, career history
  inconsistencies) and forces them to near-zero score. Layer 2 scores JD fit
  using career history descriptions and skills with verified usage duration,
  rather than raw skill-list keyword matching — explicitly penalizing
  services-only career backgrounds and unrelated technical domains per the
  JD's stated disqualifiers. Layer 3 applies a behavioral availability
  multiplier built from Redrob platform signals (recency of activity,
  recruiter response rate, notice period, GitHub activity, verified contact
  info), since a strong on-paper candidate who is unresponsive or inactive is
  not actually hireable. Final score = Fit x Availability. Runtime is ~15
  seconds for 100K candidates on CPU, well within compute constraints.

